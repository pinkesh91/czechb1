<!DOCTYPE html>
<html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'>
<title>Czech B1 Master</title>
<style>
body{font-family:-apple-system,Arial;background:#121212;color:#fff;max-width:700px;margin:auto;padding:18px}
.card{background:#222;border-radius:16px;padding:28px;text-align:center;cursor:pointer;min-height:180px}
button,input{padding:10px;margin:4px;border-radius:8px}
.small{color:#bbb}
</style></head><body>
<h2>🇨🇿 Czech B1 Master</h2>
<input id='search' placeholder='Search...' oninput='filterCards()'>
<button onclick='prev()'>◀</button><button onclick='next()'>▶</button><button onclick='shuffle()'>🔀</button>
<div class='card' onclick='flip()'>
<h1 id='cz'></h1>
<div id='back' style='display:none'>
<h2 id='en'></h2>
<p id='scz'></p>
<p class='small' id='sen'></p>
</div></div>
<p id='info'></p>
<script>
const words=[{"cz": "obchod", "en": "shop/store", "topic": "Shopping", "sentence_cz": "Nakupuji v obchodě každý pátek.", "sentence_en": "I shop at the store every Friday."}, {"cz": "práce", "en": "work", "topic": "Work", "sentence_cz": "Mám novou práci v Praze.", "sentence_en": "I have a new job in Prague."}, {"cz": "lékař", "en": "doctor", "topic": "Health", "sentence_cz": "Musím jít k lékaři.", "sentence_en": "I have to go to the doctor."}, {"cz": "škola", "en": "school", "topic": "Education", "sentence_cz": "Moje škola je blízko domu.", "sentence_en": "My school is close to home."}, {"cz": "rodina", "en": "family", "topic": "Family", "sentence_cz": "Moje rodina bydlí v Brně.", "sentence_en": "My family lives in Brno."}];
let list=[...words],i=0,show=false;
function render(){
 if(list.length===0){cz.innerText='No results';back.style.display='none';info.innerText='';return;}
 let w=list[i];
 cz.innerText=w.cz;
 en.innerText=w.en;
 scz.innerText=w.sentence_cz;
 sen.innerText=w.sentence_en;
 back.style.display=show?'block':'none';
 info.innerText=`${i+1} / ${list.length} • ${w.topic}`;
}
function flip(){show=!show;render();}
function next(){i=(i+1)%list.length;show=false;render();}
function prev(){i=(i-1+list.length)%list.length;show=false;render();}
function shuffle(){list.sort(()=>Math.random()-0.5);i=0;show=false;render();}
function filterCards(){
 let q=search.value.toLowerCase();
 list=words.filter(w=>w.cz.toLowerCase().includes(q)||w.en.toLowerCase().includes(q));
 i=0;show=false;render();
}
render();
</script></body></html>
